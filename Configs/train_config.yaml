model:
  name: "unsloth/llama-3.2-3b-instruct"
  max_seq_length: 2048
  load_in_4bit: true
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: "none"
  task_type: "CAUSAL_LM"
training:
  num_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  fp16: false
  bf16: true
  logging_steps: 10
  eval_steps: 100
  save_steps: 200
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  optim: "adamw_8bit"
  seed: 42
data:
  train_file: "data/processed/train.jsonl"
  val_file:   "data/processed/val.jsonl"
  test_file:  "data/processed/test.jsonl"
  max_samples: null
wandb:
  project: "finllm-finetune"
  entity: null
  tags: ["finqa","qlora","llama-3.2"]
output:
  dir: "outputs/r16"
  hub_model_id: null
  push_to_hub: false
